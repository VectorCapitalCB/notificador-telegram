###################### TELEGRAM ##############################################
token=PUT_YOUR_TELEGRAM_BOT_TOKEN
chat=123456789,987654321

# Hora de purge diario de mensajes enviados por el bot (HH:mm)
horaDelete=17:45

# Poll de comandos entrantes (start/stop/status)
telegram.poll.interval.seconds=20
telegram.dedup.window.ms=20000

################### TELNET VALIDATOR #########################################
# host:port separados por coma
telnet=127.0.0.1:9000,127.0.0.1:9001
telnet.interval.seconds=60
telnet.timeout.ms=3000

##################### KAFKA (TEXT) ###########################################
app.stream.kafka.binder.brokers=127.0.0.1:9092
app.stream.kafka.binder.topics=trade-monitor-notification-BYMA_MKD,trade-monitor-notification-BULLTICK

##################### KAFKA (BINARY/PROTO) ###################################
app.stream.kafka.binder.brokers.proto=127.0.0.1:9092
app.stream.kafka.binder.topics.proto=TM-NOTIFICATION-PT-XMEV,TM-NOTIFICATION-PT-BYMA_MKD
